<!DOCTYPE html>
<html lang="PT-BR">
<head>
	<meta charset="UTF-8">
	<link rel="stylesheet" type="text/css" href="estilo.css">
	<title>Contador para o ano novo</title>
</head>
<body>
	<div class="center">
		<h1><span>2020</span><br>Contador para o Ano Novo</h1>
		<div id="clock">
			
		</div>
	</div>
	<script type="text/javascript" src="jquery-2.0.0.js"></script>
	<script type="text/javascript" src="countdown.js"></script>
	<script type="text/javascript">
		$('#clock').countdown('2020/1/1', function(event) {
			// if (event.elapsed) {
			// 	document.getElementById('oi').style.color="red";
			// }

			// else {	
				var $this = $(this).html(event.strftime(''
				+ '<div><span>%w</span>Semanas</div>'
				+ '<div><span>%d</span>Dias</div>'
				+ '<div><span>%H</span>Horas</div>'
				+ '<div><span>%M</span>Minutos</div>'
				+ '<div><span>%S</span>Segundos</div>' 
				));
			// }
		});

	</script>
</body>
</html>
